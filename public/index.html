<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slovak English Translator</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="container">
    <h2>Slovak → English Translator</h2>

    <div class="translator-info">
      <div class="language-card">
        <span class="label">Speak</span>
        <span class="language">🇸🇰 Slovak</span>
      </div>

      <div class="arrow">→</div>

      <div class="language-card">
        <span class="label">Translation</span>
        <span class="language">🇬🇧 English</span>
      </div>
    </div>

    <div class="form-group">
      <label>Echo handling</label>

      <div class="radio-group">
        <label>
          <input
            type="radio"
            name="echoMode"
            value="threshold"
            checked
          />
          Quasi-AEC threshold
        </label>

        <label>
          <input
            type="radio"
            name="echoMode"
            value="mute"
          />
          Mute mic during TTS
        </label>
      </div>
    </div>

    <button id="startBtn">Start Translation</button>

    <p id="status">Status: Idle</p>

    <div id="debugPanel">
      <strong>Debug</strong>
      <pre id="debugLog"></pre>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
